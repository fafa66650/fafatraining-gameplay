<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>FAFATRAINING GOD MODE</title>
<link rel="manifest" href="./manifest.json">
<style>
:root{
  --bg:#06101a; --panel:#101a28; --panel2:#1b2740; --line:#314763; --text:#f8fbff; --muted:#bfd0e5;
  --cyan:#72ccff; --violet:#8b5cf6; --gold:#ffd166; --green:#8efc63; --red:#ff6262; --pink:#ff77b7;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;min-height:100%;font-family:Arial,Helvetica,sans-serif;background:
radial-gradient(circle at top left, rgba(114,204,255,.14), transparent 18%),
radial-gradient(circle at top right, rgba(255,119,183,.1), transparent 16%),
linear-gradient(180deg,#06101a,#050912 72%);
color:var(--text)}
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;opacity:.05;
  background-image:linear-gradient(transparent 0 92%, rgba(255,255,255,.35) 92% 100%);
  background-size:100% 14px;
}
body.nocturne{
  background:
  radial-gradient(circle at top left, rgba(114,204,255,.12), transparent 18%),
  radial-gradient(circle at top right, rgba(139,92,246,.18), transparent 16%),
  linear-gradient(180deg,#080a13,#04070f 72%);
}
body.jungle{
  background:
  radial-gradient(circle at top left, rgba(16,185,129,.18), transparent 18%),
  radial-gradient(circle at top right, rgba(255,209,102,.12), transparent 16%),
  linear-gradient(180deg,#07140f,#04100b 72%);
}
body.lab{
  background:
  radial-gradient(circle at top left, rgba(255,98,98,.14), transparent 18%),
  radial-gradient(circle at top right, rgba(114,204,255,.16), transparent 16%),
  linear-gradient(180deg,#12080a,#090409 72%);
}
#app{max-width:1280px;margin:0 auto;padding:18px}
.hero,.panel,.card,.game-shell,.final-card{
  background:linear-gradient(145deg,var(--panel),var(--panel2));
  border:1px solid var(--line);
  border-radius:30px;
  box-shadow:0 20px 42px rgba(0,0,0,.35);
}
.hero{display:grid;grid-template-columns:240px 1.2fr .8fr;gap:20px;align-items:center;padding:20px;position:relative;overflow:hidden}
.hero::after{content:"";position:absolute;inset:auto -10% -40% auto;width:320px;height:320px;background:radial-gradient(circle, rgba(114,204,255,.18), transparent 60%)}
.hero-logo{width:210px;height:210px;border-radius:26px;border:2px solid rgba(255,255,255,.14);background:#081019;padding:8px;object-fit:contain}
.kicker{font-size:12px;font-weight:900;letter-spacing:.16em;color:var(--green);text-transform:uppercase}
h1{margin:8px 0 10px;font-size:48px;line-height:1}
.subtitle{font-size:18px;line-height:1.6;color:var(--muted)}
.hero-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.stat{padding:14px;border-radius:18px;border:1px solid rgba(255,255,255,.1)}
.stat strong{display:block;font-size:32px}
.stat.a{background:linear-gradient(145deg,#183521,#21442a)}
.stat.b{background:linear-gradient(145deg,#122c3d,#17374d)}
.stat.c{background:linear-gradient(145deg,#3b1830,#4e1d3a)}
.stat.d{background:linear-gradient(145deg,#44391a,#59471b)}
.panel{padding:18px;margin-top:18px}
.cards{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px;margin-top:14px}
.card{padding:16px;position:relative;overflow:hidden;text-align:left}
.card::before,.game-shell::before,.final-card::before{content:"";position:absolute;left:0;right:0;top:0;height:4px;background:linear-gradient(90deg,var(--cyan),var(--violet),var(--gold))}
.card h3{margin:0 0 10px;font-size:22px}
.pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.pill{padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);font-size:12px;font-weight:900}
.btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
button{border:none;border-radius:16px;padding:14px 18px;font-size:17px;font-weight:900;cursor:pointer}
.btn-main{background:linear-gradient(90deg,var(--cyan),var(--violet),var(--gold));color:#081019}
.btn-alt{background:#ffffff08;color:#fff;border:1px solid rgba(255,255,255,.14)}
.game-shell{max-width:980px;margin:0 auto;padding:18px 18px 120px;position:relative;overflow:hidden}
.hud{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:center}
.hud-left,.hud-right{display:flex;gap:10px;flex-wrap:wrap}
.badge{padding:8px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.12);font-weight:900}
.points{background:rgba(142,252,99,.18)}
.timer.green{background:rgba(52,211,153,.18)}
.timer.orange{background:rgba(255,209,102,.18)}
.timer.red{background:rgba(255,98,98,.18)}
.meta{background:rgba(114,204,255,.18)}
.eventbox{margin-top:12px;padding:12px 14px;border-radius:18px;background:linear-gradient(145deg,rgba(255,119,183,.18),rgba(255,119,183,.07));border:1px solid rgba(255,119,183,.25);font-weight:900}
.turn{margin-top:14px;padding:14px 16px;border-radius:18px;background:linear-gradient(145deg,rgba(139,92,246,.28),rgba(139,92,246,.1));border:1px solid rgba(139,92,246,.36);font-size:24px;font-weight:900}
.intro-block,.story,.freeclue,.feedback{margin-top:14px;padding:18px 20px;border-radius:22px;line-height:1.65}
.intro-block,.story{background:linear-gradient(145deg,rgba(114,204,255,.12),rgba(114,204,255,.04));border:1px solid rgba(114,204,255,.22)}
.freeclue{background:linear-gradient(145deg,rgba(255,209,102,.18),rgba(255,209,102,.06));border:1px solid rgba(255,209,102,.28)}
.feedback.ok{background:linear-gradient(145deg,rgba(52,211,153,.26),rgba(52,211,153,.08));border:1px solid rgba(52,211,153,.34)}
.feedback.bad{background:linear-gradient(145deg,rgba(255,98,98,.26),rgba(255,98,98,.08));border:1px solid rgba(255,98,98,.34)}
.feedback.help{background:linear-gradient(145deg,rgba(114,204,255,.24),rgba(114,204,255,.08));border:1px solid rgba(114,204,255,.32)}
.challenge-title{font-size:34px;margin:16px 0 8px}
.challenge-type{display:inline-flex;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.12);font-size:13px;font-weight:900}
.visual{margin-top:14px;padding:18px;border-radius:20px;background:#0d1420;border:1px solid rgba(255,255,255,.1);font-size:32px;text-align:center;letter-spacing:8px}
.choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.choice{padding:18px;border-radius:18px;border:1px solid #39506d;background:#0d1420;color:#fff;text-align:left;font-size:19px;font-weight:800;line-height:1.35;cursor:pointer}
.choice.selected{outline:2px solid var(--green);background:#122031}
.help-floating{position:sticky;top:10px;display:flex;justify-content:flex-end;gap:10px;z-index:5;margin-top:14px}
.help-pill{width:54px;height:54px;border-radius:999px;display:flex;align-items:center;justify-content:center;background:#0d1420;border:1px solid rgba(255,255,255,.14);font-size:18px;font-weight:900;cursor:pointer;box-shadow:0 10px 24px rgba(0,0,0,.24)}
.help-pill:nth-child(1){color:var(--cyan)} .help-pill:nth-child(2){color:var(--gold)} .help-pill:nth-child(3){color:var(--pink)}
.validate-bar{position:fixed;left:0;right:0;bottom:0;padding:14px 18px;background:linear-gradient(180deg,rgba(6,11,18,0),rgba(6,11,18,.9) 30%, rgba(6,11,18,.98));display:flex;justify-content:center;z-index:50}
.validate-btn{width:min(760px,92vw);padding:18px 20px;border:none;border-radius:18px;background:linear-gradient(90deg,var(--cyan),var(--violet),var(--gold));color:#081019;font-size:22px;font-weight:900;box-shadow:0 16px 28px rgba(0,0,0,.35);cursor:pointer}
.final-wrap{max-width:980px;margin:0 auto}
.final-card{padding:24px;border-radius:28px;position:relative;background:linear-gradient(145deg,rgba(255,209,102,.22),rgba(255,209,102,.08))}
.big-score{font-size:72px;font-weight:900;line-height:1}
.goal-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:16px}
.goal{padding:14px;border-radius:18px;background:#0e1724;border:1px solid rgba(255,255,255,.1)}
.goal h4{margin:0 0 6px}
.small{font-size:13px;color:var(--muted)}
.flash-good{animation:flashGood .45s}
.flash-bad{animation:flashBad .45s}
@keyframes flashGood{0%{box-shadow:0 0 0 rgba(52,211,153,0)}50%{box-shadow:0 0 60px rgba(52,211,153,.45)}100%{box-shadow:0 0 0 rgba(52,211,153,0)}}
@keyframes flashBad{0%{box-shadow:0 0 0 rgba(255,98,98,0)}50%{box-shadow:0 0 60px rgba(255,98,98,.45)}100%{box-shadow:0 0 0 rgba(255,98,98,0)}}
@media (max-width:1100px){
  .hero{grid-template-columns:1fr}
  .hero-logo{width:180px;height:180px;margin:0 auto}
  .cards,.choice-grid,.goal-grid{grid-template-columns:1fr}
  h1{font-size:38px}
  .challenge-title{font-size:28px}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
const APP = document.getElementById('app');

const GAMES = [
  {
    key:'night', bodyClass:'nocturne', color:'#8b5cf6', title:'NIGHT PROTOCOL : TRAQUE SOUS LA PLUIE',
    short:'Enquête, manipulation, faux indices, pression.',
    intro:`La pluie tombe sans jamais vraiment s’arrêter.

Le bitume brille, les reflets mentent, et chaque parole semble peser plus lourd que d’habitude.

Depuis plusieurs heures, votre équipe reçoit des fragments d’informations contradictoires. Certains indices paraissent trop parfaits. D’autres sont incomplets. Et le pire, c’est qu’une partie de ce que vous allez lire est peut-être déjà truquée.

Dans NIGHT PROTOCOL, vous n’avez pas besoin de connaître un univers préalable pour jouer. Vous devez observer, douter intelligemment, relire avant de conclure, et tenir votre cap quand la pression monte.

Le protocole est simple à dire, mais beaucoup plus dur à tenir :
ne jamais faire confiance trop vite,
ne jamais ignorer un détail étrange,
et ne jamais oublier qu’un piège bien placé ressemble souvent à une évidence.

Ce soir, la pluie cache des réponses.
Mais elle cache aussi ceux qui veulent vous les faire rater.`,
    mood:"Pluie, enquête, tension mentale.",
    challenges:[
      {kind:'logic',title:'Le témoignage trop net',scene:'Quatre versions circulent. L’une impose une conclusion trop tôt et risque de saboter toute lecture sérieuse.',prompt:'Quelle déclaration faut-il neutraliser en premier ?',choices:['A · « J’ai tout compris, votez maintenant. »','B · « J’ai vu une fuite, mais je veux encore comparer. »','C · « Deux détails ne collent pas. »','D · « Je n’écarte personne pour l’instant. »'],answer:0,exp:'La plus dangereuse n’est pas celle qui doute, mais celle qui ferme le jeu avant l’examen des preuves.',free:'💧 Méfie-toi de la version qui coupe la réflexion.',h1:'Cherche la phrase qui veut décider avant d’analyser.',h2:'Le danger principal appelle au vote immédiat.',bonus:'🛡️ Bonus lucidité : +60 points.'},
      {kind:'observation',title:'Les sceaux ruisselants',scene:'Quatre sceaux paraissent identiques. Trois gardent la même orientation ; un seul a été retourné pour tromper le groupe.',prompt:'Quel sceau est incohérent ?',choices:['A · 1er','B · 2e','C · 3e','D · 4e'],answer:3,visual:'◴   ◴   ◴   ◷',exp:'Les trois premiers gardent la même orientation. Le quatrième a été inversé.',free:'👁️ L’intrus n’est pas une autre forme, mais une autre orientation.',h1:'Ne compare pas la forme globale, compare le détail orienté.',h2:'Le sceau faux se trouve tout au bout.',bonus:'⚡ Bonus focus : +60 points.'},
      {kind:'deduction',title:'Le caveau des trois chiffres',scene:'Une plaque donne trois indices : somme 12, premier chiffre supérieur au deuxième, troisième égal au double du deuxième.',prompt:'Quelle combinaison est correcte ?',choices:['A · 5 - 2 - 4','B · 4 - 2 - 6','C · 6 - 3 - 3','D · 7 - 1 - 4'],answer:1,exp:'4-2-6 respecte les trois conditions. Le piège consistait à choisir une combinaison plausible sans tout vérifier.',free:'🧠 Vérifie la somme en dernier.',h1:'Commence par la relation entre le deuxième et le troisième chiffre.',h2:'Le troisième chiffre vaut 6.',bonus:'💣 Bonus relecture : +60 points.'},
      {kind:'memory',title:'Le rapport du veilleur',scene:'Le veilleur murmure : corde grise, sceau froid, lanterne brisée, clé cuivre, pluie oblique, vitre fendue.',prompt:'Quel duo est correct ?',choices:['A · clé cuivre + vitre fendue','B · corde rouge + lanterne brisée','C · sceau chaud + pluie oblique','D · clé cuivre + lampe blanche'],answer:0,exp:'La bonne réponse réunit deux éléments réellement cités : clé cuivre et vitre fendue.',free:'📝 Cherche une proposition qui n’invente rien.',h1:'Élimine d’abord toutes celles qui changent un adjectif.',h2:'Le bon duo contient bien la clé.',bonus:'🧠 Bonus mémoire noire : +80 points.'},
      {kind:'strategy',title:'La nuit des faux calmes',scene:'Une équipe semble se replier, une autre accuse trop vite, une troisième se tait volontairement. L’une de ces postures mérite d’être lue comme la plus dangereuse.',prompt:'Laquelle est la plus risquée à cet instant ?',choices:['A · Celle qui accuse vite et fort','B · Celle qui se tait','C · Celle qui demande du temps','D · Celle qui refuse de conclure'],answer:0,exp:'L’accusation trop rapide reste la manœuvre la plus agressive et la plus risquée pour l’équilibre de la manche.',free:'🎭 Le plus bruyant n’est pas toujours innocent.',h1:'Cherche la posture qui tente de verrouiller la manche.',h2:'La piste dangereuse accuse trop vite.',bonus:'🌘 Bonus lecture sociale : +80 points.'},
      {kind:'choice',title:'Le verdict piégé',scene:'Le protocole vous laisse deux issues : suivre la piste la plus simple ou relire une dernière fois en risquant de perdre quelques secondes.',prompt:'Quel choix maximise vos chances de rester en tête ?',choices:['A · Foncez sur la piste la plus évidente','B · Relisez avant de conclure','C · Ignorez le dernier indice','D · Jouez au hasard pour gagner du temps'],answer:1,exp:'Dans cet univers, la vitesse brute sans contrôle se paie souvent très cher. Relire une dernière fois reste le choix le plus stable.',free:'⚠️ Ici, la meilleure option n’est pas forcément la plus rapide.',h1:'Le protocole récompense la lucidité avant la précipitation.',h2:'Relire avant de conclure est la meilleure piste.',bonus:'🏁 Bonus sang-froid : +70 points.'}
    ]
  },
  {
    key:'jungle', bodyClass:'jungle', color:'#10b981', title:'L’EXPÉDITION INTERDITE',
    short:'Jungle, ruines, orientation, mécanismes et survie.',
    intro:`La jungle ne fait jamais de bruit pour rien.

Chaque feuille déplacée, chaque pierre humide, chaque changement d’odeur peut annoncer un piège, un passage… ou un très mauvais choix.

Votre équipe vient d’entrer dans une zone que personne n’a réussi à cartographier entièrement. Des repères anciens réapparaissent, des mécanismes semblent encore actifs, et certaines structures donnent l’impression d’attendre quelqu’un depuis très longtemps.

Mais l’Expédition Interdite ne se gagne pas à la force. Elle se gagne à la lecture du terrain.

Vous allez devoir orienter, comparer, mémoriser, repérer des motifs, décrypter des systèmes, et surtout résister à la tentation de foncer sans comprendre.

Dans cette jungle, le décor parle.
Encore faut-il savoir l’écouter.`,
    mood:"Exploration, mystère, survie, curiosité.",
    challenges:[
      {kind:'navigation',title:'Le couloir des ruines',scene:'La route correcte doit suivre : arche creuse, zone détrempée, dalle gravée, clairière à trois pierres.',prompt:'Quelle route reste crédible ?',choices:['A · Est / arche / zone humide / dalle / clairière 3 pierres','B · Ouest / arche / clairière / zone humide','C · Nord / dalle / arche / clairière','D · Sud / rivière / colline / 2 pierres'],answer:0,exp:'La route A est la seule à garder les bons repères dans le bon ordre.',free:'🧭 L’ordre complet est la clé.',h1:'La clairière vient après la dalle gravée.',h2:'La bonne route commence par l’Est.',bonus:'🌿 Bonus trajectoire : +50 points.'},
      {kind:'pattern',title:'La mosaïque humide',scene:'Une frise de six symboles doit être symétrique depuis le centre vers les bords.',prompt:'Quelle ligne garde la bonne symétrie ?',choices:['A · feuille / eau / soleil / soleil / eau / feuille','B · feuille / eau / lune / soleil / eau / feuille','C · eau / feuille / soleil / soleil / eau / feuille','D · feuille / eau / soleil / lune / eau / feuille'],answer:0,exp:'A est la seule séquence qui répond exactement en miroir.',free:'🔁 Ne lis pas seulement de gauche à droite.',h1:'Le centre doit se répondre exactement.',h2:'La ligne correcte garde soleil / soleil au centre.',bonus:'🧩 Bonus symétrie : +50 points.'},
      {kind:'code',title:'Le mécanisme des runes',scene:'Le code a 4 chiffres pairs différents. Leur somme vaut 20 et le deuxième vaut le premier + 2.',prompt:'Quelle séquence est valable ?',choices:['A · 2 - 4 - 6 - 8','B · 4 - 6 - 8 - 2','C · 6 - 8 - 4 - 2','D · 2 - 6 - 4 - 8'],answer:0,exp:'A valide tout : 4 chiffres pairs différents, somme 20, et deuxième = premier + 2.',free:'🔐 Commence par la relation entre le 1er et le 2e chiffre.',h1:'La somme 20 élimine déjà beaucoup d’options.',h2:'La bonne séquence commence par 2 puis 4.',bonus:'🗝️ Bonus mécanisme : +60 points.'},
      {kind:'observation',title:'Le mur des glyphes',scene:'Cinq glyphes appartiennent à deux familles répétées. Un seul n’appartient à aucune famille.',prompt:'Quel glyphe est isolé ?',choices:['A · 2e','B · 4e','C · 5e','D · 1er'],answer:2,exp:'Les glyphes 1 et 3 se répondent, 2 et 4 aussi. Le 5e reste isolé.',free:'👁️ Cherche celui qui n’a aucun jumeau.',h1:'Deux paires se forment avant l’intrus.',h2:'Le glyphe isolé se trouve à la fin.',bonus:'🧿 Bonus focus : +50 points.'},
      {kind:'memory',title:'Le carnet détrempé',scene:'Le carnet s’ouvre une seconde : pierre rouge, clé cuivre, feuille noire, roue d’obsidienne, corde verte.',prompt:'Quel duo était visible ?',choices:['A · roue d’obsidienne + corde verte','B · pierre rouge + lampe blanche','C · feuille noire + gourde','D · clé cuivre + torche'],answer:0,exp:'A est le seul duo entièrement présent dans la scène.',free:'👁️ Une seule proposition contient deux vrais éléments vus ensemble.',h1:'Élimine les propositions qui ajoutent un objet jamais cité.',h2:'Le bon duo réunit la roue et la corde.',bonus:'🎒 Bonus mémoire : +70 points.'},
      {kind:'choice',title:'La chambre des faux leviers',scene:'Trois leviers promettent une ouverture. Un message prévient : “ne choisis pas le levier central, sauf si la lampe bleue s’éteint.” La lampe bleue est encore allumée.',prompt:'Quel levier faut-il éviter ?',choices:['A · Levier gauche','B · Levier central','C · Levier droit','D · Aucun'],answer:1,exp:'Le message est explicite : tant que la lampe bleue reste allumée, il faut éviter le levier central.',free:'⚠️ Ici, le décor donne déjà la règle.',h1:'La lampe bleue n’est pas éteinte.',h2:'Le levier central est interdit dans cette configuration.',bonus:'🏛️ Bonus lecture froide : +70 points.'}
    ]
  },
  {
    key:'lab', bodyClass:'lab', color:'#ff6262', title:'ZONE 13 : CONFINEMENT CRITIQUE',
    short:'Laboratoire, urgence, pression, stabilisation.',
    intro:`L’alarme a déjà commencé quand vous entrez.

La lumière change, les signaux se déclenchent en cascade, et les écrans affichent des données qui se contredisent presque aussi vite qu’elles apparaissent.

Dans ZONE 13, vous n’avez pas le luxe de travailler dans le confort.

Chaque action a un coût.
Chaque hésitation a un impact.
Et chaque mauvaise lecture peut transformer une simple erreur en problème critique.

Votre équipe doit stabiliser un système qui décroche, comprendre ce qui mérite d’être traité en premier, et prendre des décisions claires alors que la pression monte.

Ici, la panique ne sauve rien.
La vitesse seule ne suffit pas non plus.

Ce qu’il faut, c’est de la vitesse intelligente.`,
    mood:"Urgence, sang-froid, pression, efficacité.",
    challenges:[
      {kind:'code',title:'Le code de stabilisation',scene:'Le panneau impose un code dont la somme vaut 12, avec trois chiffres égaux.',prompt:'Quelle combinaison doit être validée ?',choices:['A · 4 - 4 - 4','B · 3 - 3 - 6','C · 2 - 5 - 5','D · 1 - 1 - 10'],answer:0,exp:'4-4-4 est la seule combinaison qui respecte à la fois la somme et l’égalité des trois chiffres.',free:'🔐 Le mot important ici est “égaux”.',h1:'La somme 12 doit être atteinte avec exactement trois chiffres identiques.',h2:'La combinaison correcte est 4 - 4 - 4.',bonus:'⚙️ Bonus stabilisation : +60 points.'},
      {kind:'logic',title:'La suite critique',scene:'La suite affichée grimpe trop vite pour être lue à moitié : 2, 4, 8, ?',prompt:'Quelle valeur doit suivre ?',choices:['A · 16','B · 10','C · 12','D · 14'],answer:0,exp:'La valeur double à chaque étape : 2, 4, 8, 16.',free:'🧠 Ici, la logique ne change pas en cours de route.',h1:'Chaque valeur vaut le double de la précédente.',h2:'La bonne réponse est 16.',bonus:'🚨 Bonus lecture rapide : +50 points.'},
      {kind:'strategy',title:'Le protocole d’urgence',scene:'Trois options s’affichent. Attendre peut aggraver la situation. Fuir coupe toute chance de stabilisation.',prompt:'Quelle action reste la plus crédible ?',choices:['A · Attendre','B · Agir','C · Fuir','D · Éteindre tout'],answer:1,exp:'Dans cette configuration, agir reste la seule réponse cohérente. Le niveau vient du contexte, pas d’un mot compliqué.',free:'⚠️ Élimine d’abord les options qui abandonnent le problème.',h1:'Attendre ou fuir ne stabilisent rien.',h2:'Il faut agir.',bonus:'⚡ Bonus réactivité : +60 points.'},
      {kind:'observation',title:'L’écran parasite',scene:'Quatre lignes semblent correctes, mais une seule casse la logique d’ensemble du tableau de contrôle.',prompt:'Quelle ligne est incohérente ?',choices:['A · 22 / 24 / 26','B · 30 / 32 / 34','C · 12 / 16 / 14','D · 40 / 42 / 44'],answer:2,exp:'A, B et D suivent une progression régulière de +2. C casse cette logique avec un retour en arrière.',free:'👁️ Trois lignes gardent la même montée régulière.',h1:'Cherche la seule ligne qui brise le rythme numérique.',h2:'La ligne C casse la progression.',bonus:'📡 Bonus contrôle : +60 points.'},
      {kind:'memory',title:'Le rapport de confinement',scene:'Le rapport affiche : vanne rouge, chambre 4, niveau 2, clé noire, module est.',prompt:'Quel élément n’était pas présent ?',choices:['A · chambre 4','B · clé noire','C · niveau 3','D · module est'],answer:2,exp:'Niveau 3 n’apparaissait pas : le rapport indiquait niveau 2.',free:'📝 Un seul élément a été modifié.',h1:'Tout est correct sauf le niveau.',h2:'Le faux élément est niveau 3.',bonus:'🧠 Bonus mémoire technique : +70 points.'},
      {kind:'choice',title:'La fermeture finale',scene:'Le système propose deux actions : lancer la fermeture générale maintenant, ou vérifier une dernière fois le dernier circuit au risque de perdre quelques secondes.',prompt:'Quel choix garde le plus de maîtrise ?',choices:['A · Fermer immédiatement sans relire','B · Vérifier le dernier circuit puis fermer','C · Ignorer le dernier circuit','D · Rebooter tout au hasard'],answer:1,exp:'Dans un environnement critique, relire une dernière fois avant la fermeture reste la décision la plus robuste.',free:'⚠️ Ici, le bon réflexe mélange vitesse et contrôle.',h1:'La précipitation pure est une fausse sécurité.',h2:'Vérifier le dernier circuit puis fermer est la meilleure piste.',bonus:'🧯 Bonus protocole final : +80 points.'}
    ]
  }
];

let state = {selectedGame:null, currentIndex:0, score:1000, time:0, hints:0, attempts:0, players:[], teamName:'', timer:null};

const randomEvents = [
  {text:'🎁 BONUS : +100 points', apply:()=>{state.score += 100;}},
  {text:'💣 PIÈGE : -80 points', apply:()=>{state.score = Math.max(0, state.score - 80);}},
  {text:'⏱ PRESSION : -15 secondes', apply:()=>{state.time = Math.max(0, state.time - 15);}},
  {text:'⚠️ INFO TROUBLÉE : cette manche exige une vraie relecture', apply:()=>{}},
];

function tone(type='ok'){
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type === 'start' ? 'triangle' : 'sine';
    osc.frequency.value = type === 'ok' ? 700 : type === 'bad' ? 180 : type === 'start' ? 420 : 320;
    gain.gain.value = 0.03;
    osc.start();
    osc.stop(ctx.currentTime + 0.18);
  }catch(e){}
}
function setBodyClass(name){
  document.body.classList.remove('nocturne','jungle','lab');
  if(name) document.body.classList.add(name);
}
function fmt(t){
  const m = String(Math.floor(t/60)).padStart(2,'0');
  const s = String(t%60).padStart(2,'0');
  return `${m}:${s}`;
}
function timerClass(){
  if(state.time > 120) return 'green';
  if(state.time > 45) return 'orange';
  return 'red';
}
function currentPlayer(){
  if(!state.players.length) return state.teamName || 'Équipe';
  return state.players[state.currentIndex % state.players.length];
}
function renderHome(){
  setBodyClass('');
  APP.innerHTML = `
    <div class="hero">
      <div><img src="./assets/logo.jpeg" class="hero-logo" alt="logo"></div>
      <div>
        <div class="kicker">FAFATRAINING GOD MODE</div>
        <h1>3 ESCAPE GAMES. MAXIMUM IMMERSION.</h1>
        <div class="subtitle">Version God Mode : vraies couleurs, intros longues et puissantes, événements aléatoires, chrono visible, aides en pastilles, final plus marquant.</div>
      </div>
      <div class="hero-stats">
        <div class="stat a"><strong>3</strong><span>escape games</span></div>
        <div class="stat b"><strong>18</strong><span>défis</span></div>
        <div class="stat c"><strong>fun</strong><span>+ réalisme</span></div>
        <div class="stat d"><strong>god</strong><span>mode</span></div>
      </div>
    </div>
    <section class="panel">
      <h2 class="section-title">Choisis ton escape game</h2>
      <div class="cards">
        ${GAMES.map((g, idx)=>`
          <div class="card">
            <div class="pills"><span class="pill">${g.family || g.mood}</span><span class="pill">${g.challenges.length} défis</span></div>
            <h3>${g.title}</h3>
            <div class="small">${g.short}</div>
            <div class="btns"><button class="btn-main" onclick="setupGame(${idx})">Lancer</button></div>
          </div>`).join('')}
      </div>
    </section>`;
}
function setupGame(idx){
  state.selectedGame = idx;
  const g = GAMES[idx];
  setBodyClass(g.bodyClass);
  APP.innerHTML = `
    <div class="hero" style="background:${g.bg};">
      <div><img src="./assets/logo.jpeg" class="hero-logo" alt="logo"></div>
      <div>
        <div class="kicker">${g.mood}</div>
        <h1>${g.title}</h1>
        <div class="subtitle">${g.short}</div>
      </div>
      <div class="hero-stats">
        <div class="stat a"><strong>${g.challenges.length}</strong><span>défis</span></div>
        <div class="stat b"><strong>120</strong><span>minutes max</span></div>
        <div class="stat c"><strong>2</strong><span>niveaux d’aide</span></div>
        <div class="stat d"><strong>GO</strong><span>mission</span></div>
      </div>
    </div>
    <section class="panel">
      <h2 class="section-title">Avant d’entrer dans la mission</h2>
      <div class="intro-block">${g.intro.replace(/\n/g,'<br><br>')}</div>
      <div class="goal-grid">
        <div class="goal"><h4>Objectif</h4><div>${g.goal || 'Survivre, comprendre et finir devant.'}</div></div>
        <div class="goal"><h4>Règle utile</h4><div>${g.rules || 'Le joueur actif change à chaque défi. Une fois validé, on avance sans retour arrière.'}</div></div>
        <div class="goal"><h4>Pastilles</h4><div>${g.help || 'Indice discret gratuit, puis deux pastilles payantes.'}</div></div>
      </div>
      <div class="goal-grid">
        <div class="goal"><h4>Nom d’équipe</h4><input id="teamName" placeholder="Équipe Tempête"></div>
        <div class="goal"><h4>Joueurs</h4><input id="players" placeholder="Lina, Tom, Hugo"></div>
        <div class="goal"><h4>Chrono</h4><select id="duration"><option value="1800">30 min</option><option value="2700">45 min</option><option value="3600" selected>60 min</option><option value="5400">90 min</option><option value="7200">120 min</option></select></div>
      </div>
      <div class="btns"><button class="btn-main" onclick="startGame()">ENTRER DANS LA MISSION</button><button class="btn-alt" onclick="renderHome()">Retour</button></div>
    </section>`;
}
function startGame(){
  const g = GAMES[state.selectedGame];
  state.currentIndex = 0;
  state.score = 1000;
  state.hints = 0;
  state.attempts = 0;
  state.teamName = (document.getElementById('teamName')?.value || '').trim();
  state.players = (document.getElementById('players')?.value || '').split(',').map(s=>s.trim()).filter(Boolean);
  state.time = parseInt(document.getElementById('duration')?.value || '3600', 10);
  clearInterval(state.timer);
  state.timer = setInterval(()=>{
    state.time--;
    const badge = document.getElementById('timerBadge');
    if(badge){
      badge.textContent = `⏱ ${fmt(state.time)}`;
      badge.className = `badge timer ${timerClass()}`;
    }
    if(state.time === 30) tone('bad');
    if(state.time <= 0){
      clearInterval(state.timer);
      finishGame(true);
    }
  }, 1000);
  tone('start');
  renderChallenge();
}
function applyRandomEvent(){
  if(Math.random() < 0.45){
    const ev = randomEvents[Math.floor(Math.random()*randomEvents.length)];
    ev.apply();
    return ev.text;
  }
  return '';
}
function renderChallenge(){
  const g = GAMES[state.selectedGame];
  const c = g.challenges[state.currentIndex];
  if(!c){ finishGame(false); return; }
  const eventText = applyRandomEvent();
  const kindMap = {logic:'🧠 Logique',observation:'👁 Observation',deduction:'🔐 Déduction',strategy:'⚔️ Stratégie',navigation:'🧭 Orientation',pattern:'🔁 Motif',code:'🔐 Code',choice:'🎯 Choix',memory:'🧠 Mémoire'};
  APP.innerHTML = `
    <section class="game-shell" style="--accent:${g.color}">
      <div class="hud">
        <div class="hud-left">
          <div class="badge points">Score : ${state.score}</div>
          <div class="badge meta">Défi ${state.currentIndex+1}/${g.challenges.length}</div>
          <div class="badge meta">Pastilles : ${state.hints}</div>
        </div>
        <div class="hud-right"><div id="timerBadge" class="badge timer ${timerClass()}">⏱ ${fmt(state.time)}</div></div>
      </div>
      ${eventText ? `<div class="eventbox">${eventText}</div>` : ''}
      <div class="turn">🔥 C’EST À : ${currentPlayer()} DE JOUER</div>
      <div class="story">${c.scene}</div>
      <div class="help-floating">
        <button class="help-pill" onclick="useHint(1)">⚡</button>
        <button class="help-pill" onclick="useHint(2)">⚡⚡</button>
        <button class="help-pill" onclick="showFree()">👁</button>
      </div>
      <h2 class="challenge-title">${c.title}</h2>
      <div class="challenge-type">${kindMap[c.kind] || 'Défi'}</div>
      ${c.visual ? `<div class="visual">${c.visual}</div>` : ''}
      <div class="story"><strong>Énigme :</strong><br>${c.prompt}</div>
      <div id="freeSlot"></div>
      <div class="choice-grid">
        ${c.choices.map((choice, idx)=>`<button class="choice" onclick="pick(${idx}, this)">${choice}</button>`).join('')}
      </div>
      <div id="feedback"></div>
    </section>
    <div class="validate-bar"><button class="validate-btn" onclick="validate()">VALIDER LA RÉPONSE</button></div>`;
  state.attempts = 0;
  state.picked = null;
}
function showFree(){
  const c = GAMES[state.selectedGame].challenges[state.currentIndex];
  document.getElementById('freeSlot').innerHTML = `<div class="freeclue"><strong>Indice discret :</strong><br>${c.free}</div>`;
}
function useHint(level){
  const c = GAMES[state.selectedGame].challenges[state.currentIndex];
  state.hints += 1;
  state.score = Math.max(0, state.score - (level === 1 ? 40 : 90));
  tone('start');
  document.getElementById('feedback').innerHTML = `<div class="feedback help"><strong>${level===1 ? 'Pastille ⚡' : 'Pastille ⚡⚡'}</strong><br>${level===1 ? c.h1 : c.h2}</div>`;
}
function pick(idx, el){
  document.querySelectorAll('.choice').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
  state.picked = idx;
}
function validate(){
  const c = GAMES[state.selectedGame].challenges[state.currentIndex];
  if(state.picked === null){
    document.getElementById('feedback').innerHTML = `<div class="feedback bad">Choisis d’abord une réponse.</div>`;
    return;
  }
  const shell = document.querySelector('.game-shell');
  const last = state.currentIndex >= GAMES[state.selectedGame].challenges.length - 1;
  if(state.picked === c.answer){
    state.score += 120;
    tone('ok');
    shell.classList.remove('flash-bad'); shell.classList.add('flash-good');
    document.getElementById('feedback').innerHTML = `<div class="feedback ok"><strong>✅ Bonne réponse.</strong><br>${c.exp}<br><br><strong>${c.bonus}</strong></div><div class="btns"><button class="btn-main" onclick="${last ? 'finishGame(false)' : 'nextChallenge()'}">${last ? 'VOIR LA FIN DE MISSION' : 'DÉFI SUIVANT'}</button></div>`;
  } else {
    state.attempts += 1;
    tone('bad');
    shell.classList.remove('flash-good'); shell.classList.add('flash-bad');
    if(state.attempts < 2){
      state.score = Math.max(0, state.score - 40);
      document.getElementById('feedback').innerHTML = `<div class="feedback bad"><strong>❌ Mauvaise piste.</strong><br>Tu as encore une chance. Relis la scène, affiche l’indice discret si besoin, puis corrige ta lecture.<br><br><span class="small">Pénalité : -40 points.</span></div>`;
    } else {
      state.score = Math.max(0, state.score - 80);
      document.getElementById('feedback').innerHTML = `<div class="feedback bad"><strong>💥 Défi perdu.</strong><br>Bonne réponse : <strong>${c.choices[c.answer]}</strong><br>${c.exp}<br><br><span class="small">Vous passez au défi suivant. Pas de retour arrière.</span></div><div class="btns"><button class="btn-main" onclick="${last ? 'finishGame(false)' : 'nextChallenge()'}">${last ? 'VOIR LA FIN DE MISSION' : 'DÉFI SUIVANT'}</button></div>`;
    }
  }
}
function nextChallenge(){
  state.currentIndex++;
  renderChallenge();
}
function finishGame(timeout=false){
  clearInterval(state.timer);
  tone(timeout ? 'bad' : 'ok');
  const g = GAMES[state.selectedGame];
  const mention = timeout ? 'Temps écoulé' : state.score >= 1700 ? 'Domination totale' : state.score >= 1450 ? 'Percée magistrale' : state.score >= 1200 ? 'Mission tenue' : 'Survie sous pression';
  const icon = timeout ? '⏱' : state.score >= 1700 ? '👑' : state.score >= 1450 ? '🏆' : state.score >= 1200 ? '⚡' : '🌧️';
  APP.innerHTML = `
    <section class="final-wrap">
      <div class="final-card" style="--accent:${g.color}">
        <div class="big-score">${state.score} pts</div>
        <p><strong>${icon} ${state.teamName || 'Votre équipe'}</strong> — ${mention}</p>
        <p>Pastilles utilisées : ${state.hints}</p>
        <p>${timeout ? 'Le chrono a refermé la mission avant la stabilisation complète.' : 'Vous avez tenu la pression, encaissé les pièges et refermé la mission avec une vraie identité de jeu.'}</p>
      </div>
      <div class="goal-grid">
        <div class="goal"><h4>Ce qui a compté</h4><div>Lecture des indices, gestion des erreurs, et capacité à garder le rythme sous pression.</div></div>
        <div class="goal"><h4>Récompense</h4><div>Une fin de mission plus marquante, plus visuelle, plus assumée que les versions précédentes.</div></div>
        <div class="goal"><h4>Rejouabilité</h4><div>Événements aléatoires, aides, tempo et score donnent envie de relancer la partie.</div></div>
      </div>
      <div class="btns"><button class="btn-main" onclick="renderHome()">RETOUR ACCUEIL</button></div>
    </section>`;
}
renderHome();
</script>
</body>
</html>
